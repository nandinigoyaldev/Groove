<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Rock Paper Scissors</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cyber-container">
    <header class="game-header">
      <div class="matrix-glitch">NEON SHOWDOWN</div>
      <div class="sub-title">ROCK PAPER SCISSORS</div>
    </header>

    <main class="console-box">
      <!-- Scoreboard -->
      <div class="scoreboard">
        <div class="score-card player">
          <div class="label">PLAYER</div>
          <div class="value" id="player-score">0</div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="score-card computer">
          <div class="label">CPU</div>
          <div class="value" id="computer-score">0</div>
        </div>
      </div>

      <!-- Live Arena -->
      <div class="arena">
        <div class="choice-preview" id="player-preview">?</div>
        <div class="versus-glow">X</div>
        <div class="choice-preview" id="computer-preview">?</div>
      </div>

      <!-- Action Status -->
      <div class="status-panel">
        <div class="status-msg" id="game-status">CHOOSE YOUR MOVE WEAPON...</div>
      </div>

      <!-- Buttons Grid -->
      <div class="weapon-grid">
        <button class="weapon-btn rock" onclick="playGame('rock')">
          <span class="emoji">✊</span>
          <span class="btn-lbl">ROCK</span>
        </button>
        <button class="weapon-btn paper" onclick="playGame('paper')">
          <span class="emoji">✋</span>
          <span class="btn-lbl">PAPER</span>
        </button>
        <button class="weapon-btn scissors" onclick="playGame('scissors')">
          <span class="emoji">✌️</span>
          <span class="btn-lbl">SCISSORS</span>
        </button>
      </div>

      <div style="text-align: center; margin-top: 15px;">
        <button class="reset-btn" onclick="resetGame()">RESET SYSTEM</button>
      </div>
    </main>

    <footer class="cyber-footer">
      <p>&copy; 2026 CYBERPUNK LABS. ALL RIGHTS SECURED.</p>
    </footer>
  </div>

  <script>
    let pScore = 0;
    let cScore = 0;

    const emojiMap = {
      rock: '✊',
      paper: '✋',
      scissors: '✌️'
    };

    function playGame(userChoice) {
      const choices = ['rock', 'paper', 'scissors'];
      const computerChoice = choices[Math.floor(Math.random() * choices.length)];

      // Update previews
      document.getElementById('player-preview').innerText = emojiMap[userChoice];
      document.getElementById('computer-preview').innerText = emojiMap[computerChoice];

      // Remove classes
      document.getElementById('player-preview').className = 'choice-preview active';
      document.getElementById('computer-preview').className = 'choice-preview active';

      let resultText = '';
      let statusClass = '';

      if (userChoice === computerChoice) {
        resultText = "ROUND TIED. NO SYSTEM CHANGES.";
        statusClass = 'tie';
      } else if (
        (userChoice === 'rock' && computerChoice === 'scissors') ||
        (userChoice === 'paper' && computerChoice === 'rock') ||
        (userChoice === 'scissors' && computerChoice === 'paper')
      ) {
        resultText = "YOU HACKED THE SYSTEM! ROUND WON.";
        statusClass = 'win';
        pScore++;
        document.getElementById('player-score').innerText = pScore;
      } else {
        resultText = "CPU PENETRATED SHIELD. ROUND LOST.";
        statusClass = 'lose';
        cScore++;
        document.getElementById('computer-score').innerText = cScore;
      }

      const statusEl = document.getElementById('game-status');
      statusEl.innerText = resultText;
      statusEl.className = 'status-msg ' + statusClass;
    }

    function resetGame() {
      pScore = 0;
      cScore = 0;
      document.getElementById('player-score').innerText = '0';
      document.getElementById('computer-score').innerText = '0';
      document.getElementById('player-preview').innerText = '?';
      document.getElementById('computer-preview').innerText = '?';
      
      const statusEl = document.getElementById('game-status');
      statusEl.innerText = "SYSTEM REBOOTED. STAND BY...";
      statusEl.className = 'status-msg';
    }
  </script>
</body>
</html>
