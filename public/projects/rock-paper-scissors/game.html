<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Cassette Showdown</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cassette-deck">
    {/* Boombox Header */}
    <header class="deck-header">
      <h1 class="deck-title">ANALOG TAPE DECK</h1>
      <span class="deck-model">MODEL RP-88 // STEREO</span>
    </header>

    {/* Cassette Window */}
    <div class="tape-window">
      <div class="spindle-left spinning-spindle"></div>
      <div class="spindle-right spinning-spindle"></div>
      
      {/* Tape readout display */}
      <div class="tape-display">
        <div class="status-meta">TAPE COUNTER: <span id="tape-counter">00:00</span></div>
        <div class="outcome-text" id="game-status">PRESS A SHAPE KEY...</div>
      </div>
    </div>

    {/* VU Meter (Volume indicators) */}
    <div class="vu-meter">
      <div class="vu-channel">
        <span>L</span>
        <div class="vu-leds" id="vu-l">
          <div class="led green"></div><div class="led green"></div><div class="led green"></div>
          <div class="led orange"></div><div class="led red"></div>
        </div>
      </div>
      <div class="vu-channel">
        <span>R</span>
        <div class="vu-leds" id="vu-r">
          <div class="led green"></div><div class="led green"></div><div class="led green"></div>
          <div class="led orange"></div><div class="led red"></div>
        </div>
      </div>
    </div>

    {/* Score readout */}
    <div class="score-display">
      <div class="score-card">PLAYER: <span id="player-score">0</span></div>
      <div class="score-card">CPU: <span id="computer-score">0</span></div>
    </div>

    {/* Tape deck physical buttons */}
    <div class="deck-buttons">
      <button class="deck-btn btn-rock" onclick="playGame('rock')">
        <span class="symbol">✊</span>
        <span class="lbl">ROCK [▶]</span>
      </button>
      <button class="deck-btn btn-paper" onclick="playGame('paper')">
        <span class="symbol">✋</span>
        <span class="lbl">PAPER [⏸]</span>
      </button>
      <button class="deck-btn btn-scissors" onclick="playGame('scissors')">
        <span class="symbol">✌️</span>
        <span class="lbl">SCISSORS [⏹]</span>
      </button>
    </div>

    <div style="text-align: center; margin-top: 14px;">
      <button class="eject-btn" onclick="resetGame()">EJECT TAPE</button>
    </div>
  </div>

  <script>
    let pScore = 0;
    let cScore = 0;
    let roundCount = 0;

    const emojiMap = {
      rock: '✊',
      paper: '✋',
      scissors: '✌️'
    };

    function triggerVUMeter() {
      // Flash the VU LEDs dynamically on keypress
      const leds = document.querySelectorAll('.led');
      leds.forEach(led => {
        if (Math.random() > 0.4) {
          led.classList.add('lit');
          setTimeout(() => led.classList.remove('lit'), 250);
        }
      });
    }

    function playGame(userChoice) {
      const choices = ['rock', 'paper', 'scissors'];
      const computerChoice = choices[Math.floor(Math.random() * choices.length)];
      roundCount++;

      // Update Tape counter
      const minutes = Math.floor(roundCount / 60).toString().padStart(2, '0');
      const seconds = (roundCount % 60).toString().padStart(2, '0');
      document.getElementById('tape-counter').innerText = `${minutes}:${seconds}`;

      triggerVUMeter();

      let resultText = '';
      if (userChoice === computerChoice) {
        resultText = `TIE: BOTH EXPOSED ${emojiMap[userChoice]}`;
      } else if (
        (userChoice === 'rock' && computerChoice === 'scissors') ||
        (userChoice === 'paper' && computerChoice === 'rock') ||
        (userChoice === 'scissors' && computerChoice === 'paper')
      ) {
        pScore++;
        document.getElementById('player-score').innerText = pScore;
        resultText = `WIN: PLAY ${emojiMap[userChoice]} > CPU ${emojiMap[computerChoice]}`;
      } else {
        cScore++;
        document.getElementById('computer-score').innerText = cScore;
        resultText = `LOSE: CPU ${emojiMap[computerChoice]} > PLAY ${emojiMap[userChoice]}`;
      }

      document.getElementById('game-status').innerText = resultText;
    }

    function resetGame() {
      pScore = 0;
      cScore = 0;
      roundCount = 0;
      document.getElementById('player-score').innerText = '0';
      document.getElementById('computer-score').innerText = '0';
      document.getElementById('tape-counter').innerText = '00:00';
      document.getElementById('game-status').innerText = "TAPE INSCRIBED. READY.";
    }
  </script>
</body>
</html>
