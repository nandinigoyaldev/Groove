<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketch Paper Scissors</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Gochi+Hand&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="chalk-board">
    <header class="chalk-header">
      <h1 class="chalk-title">Chalkboard Showdown</h1>
      <p class="chalk-subtitle">Grab your crayon & select your weapon!</p>
    </header>

    <main class="sketch-panel">
      <!-- Scoreboard -->
      <div class="sketch-score">
        <div class="score-box player">
          <span class="lbl">PLAYER</span>
          <span class="num" id="player-score">0</span>
        </div>
        <div class="vs-mark">vs</div>
        <div class="score-box computer">
          <span class="lbl">CPU</span>
          <span class="num" id="computer-score">0</span>
        </div>
      </div>

      <!-- Play Arena -->
      <div class="sketch-arena">
        <div class="sketch-box" id="player-preview">?</div>
        <div class="sketch-box" id="computer-preview">?</div>
      </div>

      <!-- Status Log -->
      <div class="chalk-status">
        <div id="game-status" class="status-lbl">DRAW A SHAPECUT MOVE...</div>
      </div>

      <!-- Crayon Choices Grid -->
      <div class="crayon-grid">
        <button class="crayon-btn" onclick="playGame('rock')">
          <span class="emoji">✊</span>
          <span class="label">ROCK</span>
        </button>
        <button class="crayon-btn" onclick="playGame('paper')">
          <span class="emoji">✋</span>
          <span class="label">PAPER</span>
        </button>
        <button class="crayon-btn" onclick="playGame('scissors')">
          <span class="emoji">✌️</span>
          <span class="label">SCISSORS</span>
        </button>
      </div>

      <div style="text-align: center; margin-top: 10px;">
        <button class="reset-btn" onclick="resetGame()">Clean Board</button>
      </div>
    </main>
  </div>

  <script>
    let pScore = 0;
    let cScore = 0;

    const emojiMap = {
      rock: '✊',
      paper: '✋',
      scissors: '✌️'
    };

    function playGame(userChoice) {
      const choices = ['rock', 'paper', 'scissors'];
      const computerChoice = choices[Math.floor(Math.random() * choices.length)];

      document.getElementById('player-preview').innerText = emojiMap[userChoice];
      document.getElementById('computer-preview').innerText = emojiMap[computerChoice];

      let resultText = '';
      let statusClass = '';

      if (userChoice === computerChoice) {
        resultText = "Tied round! Sketch again.";
        statusClass = 'tie';
      } else if (
        (userChoice === 'rock' && computerChoice === 'scissors') ||
        (userChoice === 'paper' && computerChoice === 'rock') ||
        (userChoice === 'scissors' && computerChoice === 'paper')
      ) {
        resultText = "You won! CPU shape erased.";
        statusClass = 'win';
        pScore++;
        document.getElementById('player-score').innerText = pScore;
      } else {
        resultText = "CPU won! Your shape erased.";
        statusClass = 'lose';
        cScore++;
        document.getElementById('computer-score').innerText = cScore;
      }

      const statusEl = document.getElementById('game-status');
      statusEl.innerText = resultText;
      statusEl.className = 'status-lbl ' + statusClass;
    }

    function resetGame() {
      pScore = 0;
      cScore = 0;
      document.getElementById('player-score').innerText = '0';
      document.getElementById('computer-score').innerText = '0';
      document.getElementById('player-preview').innerText = '?';
      document.getElementById('computer-preview').innerText = '?';
      
      const statusEl = document.getElementById('game-status');
      statusEl.innerText = "Board cleaned. Ready!";
      statusEl.className = 'status-lbl';
    }
  </script>
</body>
</html>
