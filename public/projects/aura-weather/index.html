<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud | Weather Radio Console</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="weather-dashboard">
    <!-- Bakelite Radio Header -->
    <header class="glass-header">
      <div class="brand-text"><i class="fa-solid fa-cloud"></i> CLOUD</div>
      <div class="search-box">
        <input type="text" id="city-input" placeholder="Tune city..." spellcheck="false">
        <button id="enter-button"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>
    </header>

    <main class="grid-layout">
      <!-- Main Temp Panel -->
      <section class="widget temp-panel">
        <div class="weather-state">
          <!-- FontAwesome icon slot instead of confusing PNG image -->
          <div class="weather-icon-slot">
            <i id="weather-icon-fa" class="fa-solid fa-cloud"></i>
          </div>
          <h2 class="city-name">Loading...</h2>
        </div>
        <h1 class="temperature">--°C</h1>
        <p class="weather-desc">Cloudy sky conditions</p>
      </section>

      <!-- Analog Frequency Dial (Temperature Needle Gauge) -->
      <section class="widget gauge-panel">
        <div class="gauge-header">ANALOG DIAL METRIC</div>
        <div class="gauge-track">
          <div class="gauge-needle" id="temp-needle"></div>
          <div class="gauge-labels">
            <span>COLD</span>
            <span>WARM</span>
            <span>HOT</span>
          </div>
        </div>
      </section>

      <!-- Wind Dial Widget -->
      <section class="widget metric-card">
        <div class="metric-title">
          <i class="fa-solid fa-wind"></i> WIND SPEED
        </div>
        <div class="metric-value wind">-- km/h</div>
        <div class="metric-sub">Direction: NW</div>
      </section>

      <!-- Humidity Meter Widget -->
      <section class="widget metric-card">
        <div class="metric-title">
          <i class="fa-solid fa-droplet"></i> HUMIDITY
        </div>
        <div class="metric-value humidity">--%</div>
        <div class="metric-sub">Dew point 12°</div>
      </section>
    </main>

    <!-- Radio Tuning Broadcast Panel -->
    <section class="broadcast-panel">
      <div class="broadcast-controls">
        <button class="broadcast-play-btn" id="toggle-broadcast">
          <i class="fa-solid fa-play" id="play-icon"></i> LISTEN BROADCAST
        </button>
        <button class="broadcast-delhi-btn" id="delhi-shortcut">
          <i class="fa-solid fa-map-pin"></i> TUNE DELHI AM
        </button>
        <div class="broadcast-meter">
          <div class="signal-bar" id="signal-bar-1"></div>
          <div class="signal-bar" id="signal-bar-2"></div>
          <div class="signal-bar" id="signal-bar-3"></div>
        </div>
      </div>
      <div class="broadcast-status" id="audio-status">SELECT STATION BROADCAST</div>
    </section>
  </div>

  <script src="js/script.js" defer></script>
</body>
</html>
